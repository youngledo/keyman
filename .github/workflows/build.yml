name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keyman-Windows
          path: target/release/keyman.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build
        run: cargo bundle --release

      - name: Create DMG
        run: |
          hdiutil create -volname Keyman -srcfolder target/release/bundle/osx/Keyman.app -ov Keyman.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keyman-macOS
          path: Keyman.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keyman-Linux
          path: target/release/keyman

  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename artifacts for release
        run: |
          mkdir -p dist
          mv Keyman-Windows/keyman.exe dist/Keyman-Windows.exe
          mv Keyman-macOS/Keyman.dmg dist/Keyman-macOS.dmg
          mv Keyman-Linux/keyman dist/Keyman-Linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Keyman-Windows.exe
            dist/Keyman-macOS.dmg
            dist/Keyman-Linux
